<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大信寺AI案内チャットボット iframe表示確認</title>
    <style>
      body {
        margin: 0;
        padding: 40px 16px;
        background: #f5f1e8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-wrapper {
        max-width: 1080px;
        margin: 0 auto;
      }

      .daishinji-chatbot-embed {
        width: 100%;
        max-width: 960px;
        height: 720px;
        margin: 0 auto;
      }

      .daishinji-chatbot-embed iframe {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 16px;
        overflow: hidden;
        background: #fffaf2;
      }

      @media (max-width: 768px) {
        body {
          padding: 0;
        }

        .daishinji-chatbot-embed {
          height: 100vh;
          max-width: none;
        }

        .daishinji-chatbot-embed iframe {
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-wrapper">
      <div class="daishinji-chatbot-embed">
        <iframe
          src="https://daishinji-ai-chatbot.vercel.app/chat-embed"
          title="大信寺AI案内チャットボット"
          loading="lazy"
        ></iframe>
      </div>
    </main>
  </body>
</html>
